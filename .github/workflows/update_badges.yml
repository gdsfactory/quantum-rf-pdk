name: Update Badges
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3
      - run: just install
      - name: Compute test coverage
        run: just test --cov=qpdk --cov-report=xml --cov-append -q
        continue-on-error: true
      - name: Generate badges
        run: uv run python .github/scripts/generate_badges.py
      - name: Push badges to badges branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          tmp=$(mktemp -d)
          cp badges/*.svg "$tmp/"

          git fetch origin badges 2>/dev/null && git checkout badges || {
            git checkout --orphan badges
            git rm -rf . 2>/dev/null || true
          }

          cp "$tmp"/*.svg .
          git add *.svg
          git diff --cached --quiet && echo "No badge changes" && exit 0
          git commit -m "Update metric badges [skip ci]"
          git push origin badges
