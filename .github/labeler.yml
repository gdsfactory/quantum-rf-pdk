# Configuration for GitHub Actions PR Labeler
# https://github.com/actions/labeler
ci:
  - any:
      - changed-files:
          - any-glob-to-any-file: '.github/workflows/**/*'
components:
  - any:
      - changed-files:
          - any-glob-to-any-file: 'qpdk/cells/**/*'
dependencies:
  - any:
      - changed-files:
          - any-glob-to-any-file: 'pyproject.toml'
          - any-glob-to-any-file: 'uv.lock'
          - any-glob-to-any-file: 'requirements*.txt'
documentation:
  - any:
      - changed-files:
          - any-glob-to-any-file: '*.md'
          - any-glob-to-any-file: 'docs/**/*'
drc:
  - any:
      - changed-files:
          - any-glob-to-any-file: '.github/workflows/drc.yml'
          - any-glob-to-any-file: '**/*.drc'
models:
  - any:
      - changed-files:
          - any-glob-to-any-file: 'qpdk/models/**/*'
notebooks:
  - any:
      - changed-files:
          - any-glob-to-any-file: '*.ipynb'
          - any-glob-to-any-file: 'notebooks/**/*'
pdk:
  - any:
      - changed-files:
          - any-glob-to-any-file: 'qpdk/**/*'
pre_commit:
  - any:
      - changed-files:
          - any-glob-to-any-file: '.pre-commit-config.yaml'
python:
  - any:
      - changed-files:
          - any-glob-to-any-file: '**/*.py'
samples:
  - any:
      - changed-files:
          - any-glob-to-any-file: 'qpdk/samples/**/*'
simulations:
  - any:
      - changed-files:
          - any-glob-to-any-file: 'qpdk/simulation/**/*'
technology:
  - any:
      - changed-files:
          - any-glob-to-any-file: 'qpdk/tech.py'
          - any-glob-to-any-file: 'qpdk/layers.yaml'
          - any-glob-to-any-file: 'qpdk/klayout/**/*'
tests:
  - any:
      - changed-files:
          - any-glob-to-any-file: 'tests/**/*'
          - any-glob-to-any-file: 'test_*.py'
          - any-glob-to-any-file: '*_test.py'
