exclude: ^uv\.lock$
# Hook priorities for prek parallel execution:
# 10: Initial formatters and independent checkers (e.g., ruff check, codespell)
# 20: Dependent formatters and linters (e.g., ruff-format, stylelint)
# 30: Global end-of-file-fixer
# 40: Global trailing-whitespace cleanup
repos:
  - repo: https://github.com/doplaydo/pdk-ci-workflow
    rev: 6d46a20ed995ac59e898c16e0eea8f3216c1f147
    hooks:
      - id: check-required-files
        priority: 10
      - id: check-pyproject-sections
        priority: 10
      - id: check-package-init
        priority: 10
      - id: check-cells-structure
        priority: 10
      - id: check-tech-structure
        priority: 10
      - id: check-pdk-object
        priority: 10
      - id: check-test-structure
        priority: 10
      - id: check-makefile-targets
        priority: 10
      - id: check-workflows
        priority: 10
      - id: check-multi-band
        priority: 10
      - id: check-no-raw-layers
        priority: 10
      - id: check-no-main-in-cells
        priority: 10
      - id: check-precommit-config
        priority: 10
      - id: check-version-sync
        priority: 10
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        priority: 10
        exclude: ^(conda\.recipe/meta\.yaml|conda_build/templates/.*\.yaml|docs/click/meta\.yaml|conda/meta\.yaml|conda/construct.yaml|.*\.pic\.yml|conda/constructor/Miniforge3/construct.yaml)
      - id: end-of-file-fixer
        priority: 30
      - id: trailing-whitespace
        priority: 40
      - id: detect-private-key
        priority: 10
  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout
        priority: 10
        files: ".ipynb"
        exclude: ^notebooks/(hfss_driven_capacitor|hfss_eigenmode_resonator|hfss_q2d_cpw_impedance)\.ipynb$
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        priority: 10
        exclude: ^(docs/bibliography\.bib|notebooks/(hfss_driven_capacitor|hfss_eigenmode_resonator|hfss_q2d_cpw_impedance)\.ipynb)$
        additional_dependencies:
          - tomli
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        priority: 10
        args: [--fix, --exit-non-zero-on-fix, --config=pyproject.toml]
      - id: ruff-format
        priority: 20
        args: [--config=pyproject.toml]
  - repo: https://github.com/tombi-toml/tombi-pre-commit
    rev: v0.9.12
    hooks:
      - id: tombi-format
        priority: 10
        exclude: \.github/lychee\.toml$
      - id: tombi-lint
        priority: 20
  - repo: https://github.com/aristanetworks/j2lint.git
    rev: v1.2.0
    hooks:
      - id: j2lint
        priority: 10
        types: [file]
        files: \.(j2|yml|yaml)$
        exclude: .github/.*
        args: [--ignore, jinja-statements-delimiter, single-statement-per-line, jinja-statements-indentation, --]
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
        priority: 10
        args: [-conf, ".github/.yamlfmt.yaml"]
        exclude: &regression_tests ".*.tests*"
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        priority: 20
        args: [--strict, "-c=.github/.yamllint.yaml"]
        exclude: *regression_tests
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        priority: 10
  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: v1.23.1
    hooks:
      - id: zizmor
        priority: 10
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.6
    hooks:
      - id: uv-lock
        priority: 10
  - repo: https://github.com/facebook/pyrefly-pre-commit
    rev: 0.58.0
    hooks:
      - id: pyrefly-check
        priority: 20
        name: Pyrefly
        pass_filenames: false
        # Pre-commit may not have access to all deps.
        args: ["--ignore", "missing-import"]
  - repo: https://github.com/FlamingTempura/bibtex-tidy
    rev: v1.14.0
    hooks:
      - id: bibtex-tidy
        priority: 10
        args: ['--align=1', '--curly', '--months', '--sort', '--duplicates', '--strip-enclosing-braces']
  - repo: https://github.com/AleksaC/hadolint-py
    rev: v2.14.0
    hooks:
      - id: hadolint
        priority: 10
  - repo: https://github.com/checkmake/checkmake.git
    rev: v0.3.2
    hooks:
      - id: checkmake
        priority: 20
        args: ['--config=.github/.checkmake.ini']
  - repo: https://github.com/EbodShojaei/bake
    rev: v1.4.6
    hooks:
      - id: mbake-validate
        priority: 20
      - id: mbake-format
        priority: 10
        args: ['--config=.github/.bake.toml']
  - repo: https://github.com/LilSpazJoekp/docstrfmt
    rev: v2.0.2
    hooks:
      - id: docstrfmt
        priority: 20
        language_version: python3
        types: [rst]
  - repo: https://github.com/sphinx-contrib/sphinx-lint
    rev: v1.0.2
    hooks:
      - id: sphinx-lint
        priority: 20
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.0
    hooks:
      - id: markdownlint-cli2
        priority: 20
        name: markdownlint
        args: [--config, .github/.markdownlint-cli2.yaml]
        additional_dependencies:
          - katex@0.16.45
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.22
    hooks:
      - id: mdformat
        priority: 10
        args: [--wrap=120]
        exclude: ^docs/(index|changelog|make_commands)\.md$
        additional_dependencies:
          - mdformat-gfm
          - mdformat-gfm-alerts
          - mdformat-tables
          - mdformat-frontmatter
          - mdformat-footnote
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        priority: 10
        types_or: [css]
  - repo: https://github.com/thibaudcolas/pre-commit-stylelint
    rev: v17.6.0
    hooks:
      - id: stylelint
        priority: 20
        args: [--fix, --config=.github/.stylelintrc.yaml]
        additional_dependencies:
          - stylelint@17.7.0
  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        priority: 20
        args: [--config=pyproject.toml]
        pass_filenames: true
        exclude: '^(?:docs/_build/.*|qpdk(?:/.*)?/__init__[.]py|notebooks/.*|docs/notebooks/[^/]+|qpdk/samples/[^/]+[.]py|tests/.*)$'
  - repo: https://github.com/lycheeverse/lychee.git
    rev: lychee-v0.24.1
    hooks:
      - id: lychee
        priority: 10
        args: [--config, .github/lychee.toml]
  - repo: local
    hooks:
      # - id: just-fmt
      #   priority: 10
      #   name: Format justfiles
      #   entry: just --fmt --unstable
      #   language: system
      #   files: (^|/)justfile$|\.just$
      #   pass_filenames: false
      - id: convert-notebooks
        priority: 10
        name: Convert jupytext notebooks
        entry: ./.github/convert-notebooks.sh
        language: script
        files: ^notebooks/src/.*\.py$
        pass_filenames: true
      - id: check-notebook-sources
        priority: 10
        name: Check notebooks have source files
        entry: ./.github/check-notebook-sources.sh
        language: script
        files: ^notebooks/.*\.ipynb$
        pass_filenames: false
